name: Release

# Tag push v* → npm publish + GitHub Release (Windows zip) + bump Homebrew tap
# Secrets: NPM_TOKEN (npm Automation token)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets['NPM_TOKEN'] }}

  build-windows:
    runs-on: windows-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: node scripts/build-win-portable.mjs
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/release/sanook-cli-win-x64.zip
          generate_release_notes: true

  bump-homebrew-tap:
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bash scripts/publish-homebrew-tap.sh
        env:
          GH_TOKEN: ${{ github.token }}
