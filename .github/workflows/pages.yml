name: Pages

# Prefer branch deploy (no Actions billing): bash scripts/deploy-sanook-ai-pages.sh
# This workflow re-runs the same deploy on push when Actions is available.
on:
  push:
    branches: [main]
    paths:
      - 'packaging/sanook-ai/**'
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - 'scripts/deploy-sanook-ai-pages.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/deploy-sanook-ai-pages.sh
        env:
          GH_TOKEN: ${{ github.token }}
