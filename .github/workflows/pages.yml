name: Pages

# Deploy install scripts to GitHub Pages (custom domain: sanook.ai)
# After first run: Repo Settings → Pages → Custom domain → sanook.ai
# DNS: CNAME sanook.ai → Sir-chawakorn.github.io (or A records for GitHub Pages)
on:
  push:
    branches: [main]
    paths:
      - 'packaging/sanook-ai/**'
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync install scripts
        run: bash scripts/sync-sanook-ai-site.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packaging/sanook-ai
      - id: deployment
        uses: actions/deploy-pages@v4
