name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
        env:
          CI: "1"
      - run: npm run build
      - name: verify bin is executable (กัน 'permission denied')
        if: runner.os != 'Windows'
        run: test -x dist/bin.js
      - name: smoke — bin รันได้ (--version, --help)
        run: |
          node dist/bin.js --version
          node dist/bin.js --help
